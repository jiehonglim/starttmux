<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheat sheet — StartTmux</title>
  <meta name="description" content="tmux shortcuts and golden path for AI coders managing coding agents.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%96%A3</text></svg>">
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="site-header__brand">start<span>tmux</span></a>
    <nav class="site-header__nav">
      <a href="cheatsheet.html" class="site-header__link site-header__link--active">Cheat sheet</a>
      <a href="index.html" class="site-header__link">Learn</a>
      <a href="simulator.html" class="site-header__link">Simulator</a>
    </nav>
    <button type="button" class="btn btn--ghost" id="theme-toggle" aria-label="Toggle theme">Theme</button>
  </header>

  <main class="cheat-page" id="cheat-root" aria-busy="true">
    <p class="cheat-muted">Loading cheat sheet…</p>
  </main>

  <script type="module" src="js/cheatsheet-page.js"></script>
  <script>
    document.getElementById('theme-toggle')?.addEventListener('click', () => {
      const html = document.documentElement;
      const next = html.dataset.theme === 'light' ? 'dark' : 'light';
      html.dataset.theme = next;
      localStorage.setItem('starttmux_theme', next);
    });
    const saved = localStorage.getItem('starttmux_theme');
    if (saved) document.documentElement.dataset.theme = saved;
  </script>
</body>
</html>
