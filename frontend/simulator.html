<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simulator — start tmux</title>
  <meta name="description" content="Free-play tmux simulator with fake coding agents and shell commands.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%96%A3</text></svg>">
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body data-page="simulator">
  <header class="site-header">
    <a href="index.html" class="site-header__brand">start<span>tmux</span></a>
    <nav class="site-header__nav" data-site-nav></nav>
    <span class="site-header__badge" data-egg-badge hidden>easter egg</span>
    <button type="button" class="btn btn--ghost" id="theme-toggle" aria-label="Toggle theme">Theme</button>
  </header>

  <section class="sim-hero">
    <h1>tmux simulator</h1>
    <p>Split with <kbd>⌃ b %</kbd>. Spawn <code>grok-build</code>, <code>hermes</code>, or <code>claude-code</code>. Run <code>npm test</code> in another pane. <a href="index.html">Learn the golden path</a> first if you are new.</p>
  </section>

  <main class="play-layout">
    <div class="terminal terminal--sim" data-terminal tabindex="0">
      <div class="terminal__board" data-board aria-label="tmux simulator"></div>
      <div class="status" data-status>
        <span class="status__prefix" data-prefix></span>
        <span class="status__windows" data-windows></span>
        <span class="status__flair" data-flair hidden></span>
        <span class="status__hint mode-desktop-only">type commands · ⌃ b = prefix · ⌃ c = stop</span>
      </div>
    </div>

    <section class="touch-panel" data-touch-panel hidden aria-label="Touch controls">
      <p class="touch-panel__label">tmux shortcuts</p>
      <div class="touch-panel__keycaps" data-keycaps></div>
    </section>

    <section class="script-dock" data-script-dock aria-label="Run scripts"></section>
  </main>

  <footer class="site-footer" data-site-footer></footer>

  <script type="module" src="js/site.js"></script>
  <script type="module" src="js/sim-app.js"></script>
</body>
</html>
